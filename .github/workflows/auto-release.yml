name: Auto Release

# Runs on every push to main — derives the next version from the latest git tag
# (falls back to version.txt if no tags exist), then bumps the appropriate
# component based on the merged branch prefix:
#   feature/*  → minor bump, patch resets to 0  (e.g. 1.5.2 → 1.6.0)
#   breaking/* → major bump, minor+patch reset  (e.g. 1.6.0 → 2.0.0)
#   fix/* or anything else → patch bump only    (e.g. 1.6.0 → 1.6.1)

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-2025
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # needed to read full tag history

      - name: Derive next version
        id: version
        shell: pwsh
        run: |
          # Base version from latest tag, falling back to version.txt
          $latest = git tag --list 'v*.*.*' --sort=-version:refname | Select-Object -First 1
          $base = if ($latest) { $latest.TrimStart('v') } else { (Get-Content version.txt -Raw).Trim() }

          $major, $minor, $patch = $base.Split('.') | ForEach-Object { [int]$_ }

          # Determine bump type from the merge commit message
          $commitMsg = git log -1 --pretty=%B
          if ($commitMsg -match 'breaking/') {
            $major += 1; $minor = 0; $patch = 0
          } elseif ($commitMsg -match 'feature/') {
            $minor += 1; $patch = 0
          } else {
            $patch += 1
          }

          $new = "$major.$minor.$patch"
          "VERSION=$new" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "BUMP_TYPE=$(if ($commitMsg -match 'breaking/') { 'major' } elseif ($commitMsg -match 'feature/') { 'minor' } else { 'patch' })" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore BetterPrompt/BetterPrompt.csproj

      - name: Publish — self-contained single-file win-x64
        shell: pwsh
        run: |
          dotnet publish BetterPrompt/BetterPrompt.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:Version=${{ steps.version.outputs.VERSION }} `
            -o publish

      - name: Build installer
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            /DAppVersion=${{ steps.version.outputs.VERSION }} `
            installer\BetterPrompt.iss

      - name: Push version tag
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag v${{ steps.version.outputs.VERSION }}
          git push origin v${{ steps.version.outputs.VERSION }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: "BetterPrompt v${{ steps.version.outputs.VERSION }}"
          files: installer/Output/BetterPrompt-Setup.exe
          generate_release_notes: true
          fail_on_unmatched_files: true
