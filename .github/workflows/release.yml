name: Release

# Trigger by pushing a version tag: git tag v1.0.0 && git push origin v1.0.0
on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write   # needed to create the GitHub Release and upload assets

jobs:
  build-installer:
    runs-on: windows-2025
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Extract version from tag
        id: version
        shell: pwsh
        run: |
          $ver = "${{ github.ref_name }}".TrimStart('v')
          "VERSION=$ver" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Restore
        run: dotnet restore BetterPrompt/BetterPrompt.csproj

      - name: Publish — self-contained single-file win-x64
        shell: pwsh
        run: |
          dotnet publish BetterPrompt/BetterPrompt.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:Version=${{ steps.version.outputs.VERSION }} `
            -o publish

      - name: Build installer (Inno Setup — pre-installed on windows-latest)
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            /DAppVersion=${{ steps.version.outputs.VERSION }} `
            installer\BetterPrompt.iss

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "BetterPrompt v${{ steps.version.outputs.VERSION }}"
          files: installer/Output/BetterPrompt-Setup.exe
          generate_release_notes: true
          fail_on_unmatched_files: true
